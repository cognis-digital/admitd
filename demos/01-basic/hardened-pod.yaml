apiVersion: v1
kind: Pod
metadata:
  name: hardened-app
  namespace: default
spec:
  containers:
    - name: app
      image: registry.internal/team/app:1.4.2
      securityContext:
        privileged: false
        allowPrivilegeEscalation: false
        runAsNonRoot: true
        readOnlyRootFilesystem: true
        seccompProfile:
          type: RuntimeDefault
        capabilities:
          drop:
            - ALL
      resources:
        limits:
          cpu: "500m"
          memory: "256Mi"

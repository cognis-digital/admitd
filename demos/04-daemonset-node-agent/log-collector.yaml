apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: log-collector
  namespace: logging
spec:
  selector:
    matchLabels:
      app: log-collector
  template:
    metadata:
      labels:
        app: log-collector
    spec:
      hostNetwork: true
      volumes:
        - name: varlog
          hostPath:
            path: /var/log
            type: Directory
      containers:
        - name: collector
          image: registry.internal/logging/collector:1.12.0
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
          resources:
            limits:
              cpu: "200m"
              memory: "192Mi"
          volumeMounts:
            - name: varlog
              mountPath: /var/log
              readOnly: true
